name: Build Android APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Ensure gradle-wrapper.jar exists
        run: |
          JAR=gradle/wrapper/gradle-wrapper.jar
          if [ ! -f "$JAR" ]; then
            echo "Downloading gradle-wrapper.jar..."
            mkdir -p gradle/wrapper
            curl -sL "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
              -o "$JAR"
          else
            echo "gradle-wrapper.jar already present ($(du -h $JAR | cut -f1))"
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: widget-launcher-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

  release:
    name: Create Release APK
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Ensure gradle-wrapper.jar exists
        run: |
          JAR=gradle/wrapper/gradle-wrapper.jar
          if [ ! -f "$JAR" ]; then
            mkdir -p gradle/wrapper
            curl -sL "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
              -o "$JAR"
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 签名配置（可选）──────────────────────────────────────────────────────
      # 在仓库 Settings → Secrets and variables → Actions 中添加：
      #   KEYSTORE_BASE64   — base64 编码的 .jks 文件：cat release.jks | base64
      #   KEY_ALIAS         — keystore 别名
      #   KEY_PASSWORD      — key 密码
      #   STORE_PASSWORD    — keystore 密码
      # 然后取消注释下面的 "Build Release APK (signed)" 步骤，注释掉 unsigned 步骤。
      # ─────────────────────────────────────────────────────────────────────────

      # - name: Decode keystore
      #   run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

      # - name: Build Release APK (signed)
      #   run: |
      #     ./gradlew assembleRelease \
      #       -Pandroid.injected.signing.store.file=${{ github.workspace }}/keystore.jks \
      #       -Pandroid.injected.signing.store.password=${{ secrets.STORE_PASSWORD }} \
      #       -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
      #       -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
      #       --no-daemon

      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --no-daemon

      - name: Get tag name
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: Widget Launcher ${{ steps.tag.outputs.TAG }}
          body: |
            ## Widget Launcher ${{ steps.tag.outputs.TAG }}

            Android 桌面组件应用 — 支持自定义 HTML/CSS/JS 前端组件

            ### 安装方法
            1. 下载下方 APK 文件
            2. 手机开启「安装未知来源应用」
            3. 安装并打开即可

            ### 功能特性
            - 支持 Vanilla JS / Vue 3 / React 18 自定义组件
            - 内置代码编辑器 + 实时预览
            - 7 个内置模板（时钟、天气、待办、番茄钟、加密货币等）
            - AndroidBridge JS ↔ Kotlin 通信 API
            - 组件持久化存储（SharedPreferences）
            - 可选 NanoHTTPD 本地 HTTP 服务（解决跨域问题）

            ### 系统要求
            - Android 7.0 (API 24) 及以上
          files: app/build/outputs/apk/release/app-release-unsigned.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
